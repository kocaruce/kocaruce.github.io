<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>꿈 놀이터 · 관리자</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin">
  <header id="hub-header">
    <div class="header-inner">
      <div class="brand"><span class="brand-mark">🌈</span> 꿈 놀이터 <span class="admin-tag">관리자</span></div>
      <a class="pos-link" href="index.html">← 허브로</a>
    </div>
  </header>

  <main id="admin-main">
    <div id="admin-gate" class="admin-note">확인 중…</div>

    <section id="admin-content" hidden>
      <div class="admin-cards">
        <div class="stat"><span class="stat-label">가입 선생님</span><span class="stat-num" id="stat-users">–</span></div>
        <div class="stat"><span class="stat-label">후원 기록</span><span class="stat-num" id="stat-dons">–</span></div>
      </div>

      <div class="admin-h2-row">
        <h2 class="admin-h2">가입한 선생님 <span id="count-users"></span></h2>
        <div class="admin-tools">
          <input type="text" id="user-search" placeholder="이름·소속·지역·원 이름 검색">
          <button class="csv-btn" id="users-csv">CSV 다운로드</button>
        </div>
      </div>
      <div class="table-wrap">
        <table id="users-table">
          <thead><tr><th>이름</th><th>소속</th><th>지역</th><th>원 이름</th><th>이메일</th><th>가입일</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="admin-h2-row">
        <h2 class="admin-h2">후원 기록 <span id="count-dons"></span></h2>
        <div class="admin-tools">
          <button class="csv-btn" id="dons-csv">CSV 다운로드</button>
        </div>
      </div>
      <div class="table-wrap">
        <table id="dons-table">
          <thead><tr><th>일시</th><th>이름</th><th>소속·원</th><th>지역</th><th>방법</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <h2 class="admin-h2">운영 관리</h2>
      <div class="ops-card">
        <p class="ops-desc">오래된 주문 기록을 정리해 데이터베이스를 가볍게 유지하세요. 선택한 날짜 <b>이전</b>의 주문이 모두 삭제됩니다 (되돌릴 수 없어요).</p>
        <div class="ops-row">
          <input type="date" id="cleanup-date">
          <button class="gate-primary" id="cleanup-btn">이전 주문 정리하기</button>
        </div>
        <p class="ops-result" id="cleanup-result"></p>
      </div>
    </section>
  </main>

  <script src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
